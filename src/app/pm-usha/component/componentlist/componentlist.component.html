
<div class="container-fluid reg-page-bg pl-4 pr-4">
    <div class="form-group">
        <div class="form-row mr-0 ml-0">
            <div class="col-md-12 mt-0 badges p-2 mt-3">
                <div class="float-left">
                    <span class="text-info font-weight-bolder text-lg">Component</span>
                </div>
            </div>
        </div>
    </div>
    <div class="animated fadeInDown card mb-2 pb-1 pt-1 bg-light overflow-hidden">
        <div class="col-md-12 table-responsive">
            <table class="table table-bordered table-sm">
                <tr>
                    <th>S.No.</th>
                    <th>Component</th>
                </tr>
                <ng-container *ngFor="let item of listData;let i=index">
                    <tr>
                        <td>{{i+1}}</td>
                        <td><span class="hyperlink" (click)="goToComponent(item)">{{item.componentName}}</span></td>
                        
                    </tr>
                </ng-container>
            </table>
        </div>
       
    </div>
</div>
