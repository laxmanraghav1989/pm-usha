<div class="container-fluid reg-page-bg pl-4 pr-4">
    <div class="form-group">
        <div class="form-row mx-0">
        <div class="col-md-10 p-2 mt-2">
            <div class="component-heading">
                Output-Outcomes Monitoring Report
            </div>
          
        </div>
        <div class="col-md-2 p-2" style="margin-top: 25px;">
              <p (click)="exportExcel()" class="download-xls">Download&nbsp;<i class="fa fa-file-excel-o" matTooltip="Download as Excel"></i></p>
        </div>
        </div>
    </div>
<div class="ag-theme-alpine" style="width: 100%;">
                 <ag-grid-angular style="width: 100%" [style.height]="getGridHeight()" class="ag-theme-alpine" [rowData]="rowData" [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" rowSelection="multiple"
                (gridReady)="onGridReady($event)" [pagination]="true" [quickFilterText]="searchText" [paginationPageSize]="paginationPageSize"  rowSelection="multiple", (selectionChanged)="onSelectionChanged()">
            </ag-grid-angular>
            
</div>
<div class="footerBtn" *ngIf="userTypeId == 2 && isVisble">
<button type="button" class="btn btn-success" (click)="confirmNPDDialog()" [disabled]="disabled">Forwarded To NPD</button>
</div>



</div>
