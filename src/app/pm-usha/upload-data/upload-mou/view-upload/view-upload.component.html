<div class="container-fluid reg-page-bg pl-4 pr-4">
     <div class="form-group">
        <div class="form-row mx-0">
            <div class="col-md-12 p-2 mt-2">
                <div class="component-heading">View MoU</div>
            </div>
        </div>
    </div>
    <div class="animated fadeInDown card shadow mb-4 pt-1 pb-2 pr-4 pl-4 bg-light">
        <div class="row col-md-12 overflow-hidden mt-1 table-responsive">
            <table class="table table-sm table-bordered">
                <tr>
                    <th>S.No</th>
                    <th>Document</th>
                    <th *ngIf="userTypeId === sharedService.userTypeList['8'].id || userTypeId === sharedService.userTypeList['9'].id">State Name</th>
                </tr>
                <ng-container *ngFor="let item of docsList;let i=index">
                    <tr>
                        <td>{{i+1}}</td>
                        <td matTooltip="Download as PDF"><span (click)="viewPdf(item.documentFile,item.fileName)"
                                style="color:red;cursor: pointer;">{{item.fileName}}</span></td>
                                <td *ngIf="userTypeId === sharedService.userTypeList['8'].id || userTypeId === sharedService.userTypeList['9'].id">{{item.stateName}}</td>
                    </tr>
                </ng-container>
            </table>

        </div>
    </div>
</div>
