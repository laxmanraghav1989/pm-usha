<div class="container-fluid reg-page-bg pl-4 pr-4">
  <div class="animated fadeInDown card shadow mb-4 pt-1 pb-2 pr-4 pl-4 bg-light">
    <div class="col-md-12 font-weight-bolder pt-1 pb-2 pr-2 pl-2 text-center text-lg">
      <h3 class="heading">Grants to Strengthen Universities</h3>
    </div>
    <form>

      <div class="animated fadeInDown card shadow mb-4 pt-1 pb-2 pr-4 pl-4 bg-light">
        
        <mat-tab-group animationDuration="0ms" class="exam-tabing-steps">

            <mat-tab label="Basic Details">
                   <br>
                   <div class="form-group row">
                    <label for="stateName" class="col-sm-2 col-form-label">Name of the University:</label>
                    <div class="col-sm-4">
                      <input type="text" class="form-control form-control-sm">
                    </div>
            
                    <label for="inputPassword" class="col-sm-2 col-form-label">AISHE Code:</label>
                    <div class="col-sm-4">
                      <input type="text" class="form-control form-control-sm">
                    </div>
                  </div>
            
            
                  <div class="form-group row">
                    <label for="stateName" class="col-sm-2 col-form-label">Address of the University:</label>
                    <div class="col-sm-4">
                      <input type="text" class="form-control form-control-sm">
                    </div>
            
                    <label for="inputPassword" class="col-sm-2 col-form-label">Name of the District:</label>
                    <div class="col-sm-4">
                      <input type="text" class="form-control form-control-sm">
                    </div>
                  </div>
            
                  <div class="form-group row">
                      
                    <label for="inputPassword" class="col-sm-2 col-form-label">Year of opening:</label>
                    <div class="col-sm-4">
                      <input type="text" class="form-control form-control-sm">
                    </div>
                  </div>
            
            
            
                  <div class="form-group row">
                    <label for="stateName" class="col-sm-2 col-form-label">Whether State Government University (only State Government Universities eligible)</label>
                    <div class="col-sm-4">
                      <input type="radio" id="yes" name="fav_language" value="YES"> &nbsp;
                      <label for="html">Yes</label>&nbsp;&nbsp;
                      <input type="radio" id="no" name="fav_language" value="NO">&nbsp;
                      <label for="css">No</label>
                    </div>
            
                    <label for="stateName" class="col-sm-2 col-form-label">Is the University running from a permanent campus or temporary campus</label>
                    <div class="col-sm-4">
                      <input type="radio" id="yes" name="fav_language" value="YES"> &nbsp;
                      <label for="html">Permanent</label>&nbsp;&nbsp;
                      <input type="radio" id="no" name="fav_language" value="NO">&nbsp;
                      <label for="css">Temporary</label>
                    </div>
                  </div>
                  
                  
                  <hr>
                  <div class="form-group row">
                    <label for="inputPassword" class="col-sm-6 col-form-label">Accreditation status as on date of
                      application</label>
                    <div class="col-sm-6">
                      <input type="radio" id="yes" name="fav_language" value="YES"> &nbsp;
                      <label for="html">Accredited</label>&nbsp;&nbsp;
                      <input type="radio" id="no" name="fav_language" value="NO">&nbsp;
                      <label for="css">Not accredited</label>
                    </div>
                  </div>
            
            
            
                  <div class="form-group row">
                    <label for="stateName" class="col-sm-6 col-form-label">If Not Accredited, then whether it has submitted the IIQA
                      and has started the process of getting
                      Accreditation:</label>
                    <div class="col-sm-6">
                      <input type="radio" id="yes" name="fav_language" value="YES"> &nbsp;
                      <label for="html">Yes</label>&nbsp;&nbsp;
                      <input type="radio" id="no" name="fav_language" value="NO">&nbsp;
                      <label for="css">No</label>
                    </div>
                  </div>
            
            
                  <div class="form-group row">
            
                    <label for="name" class="col-sm-2 col-form-label">
                      If accredited then Accreditation score and Grade:
                    </label>
            
                    <div class="col-md-4">
                      <table >
                        <tr>
                          <th>Score</th>
                          <th>Grade</th>
            
                        </tr>
                        <tr>
                          <td><input type="text"> </td>
                          <td><input type="text"> </td>
                        </tr>
                      </table>
                    </div>
            
                    <label for="name" class="col-sm-2 col-form-label">
                      Date of validity of accreditation:
                    </label>
            
                    <div class="col-md-4">
                      <input type="date" class="form-control form-control-sm" id="name">
                    </div>
            
                  </div>
            
</mat-tab>
      <mat-tab label="Earlier Approval details under RUSA">
        <div class="form-group row">
  
          <label for="inputPassword" class="col-sm-4 col-form-label">Has the institution been earlier approved under
            RUSA:</label>
          <div class="col-sm-4">
            <input type="radio" id="yes" name="fav_language" value="YES"> &nbsp;
            <label for="html">Yes</label>&nbsp;&nbsp;
            <input type="radio" id="no" name="fav_language" value="NO">&nbsp;
            <label for="css">No</label>
          </div>
        </div>
        <div class="form-group row">
          <label for="stateName" class="col-sm-6 col-form-label"> Details of earlier consolidated approvals to the
            institution
            under RUSA (as on date of application:</label>
  
        </div>
  
  
  
        <div class="col-md-12 table-responsive">
          <table class="table table-sm table-bordered">
            <tr>
              <th rowspan="2">S.No.</th>
              <th colspan="3">Central Share (Rs. Crore)</th>
              <th colspan="3">State Share </th>
              <th colspan="3">Total Amount </th>
  
            </tr>
            <tr>
              <th>Approved </th>
              <th>Released </th>
              <th>Utilised </th>
              <th>Approved </th>
              <th>Released </th>
              <th>Utilised </th>
              <th>Approved </th>
              <th>Released </th>
              <th>Utilised </th>
            </tr>
            <tr>
              <td>1.</td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
              <td><input type="text" class="form-control form-control-sm"> </td>
            </tr>
  
  
          </table>
  
        </div>
  
        <div class="form-group row">
          <label for="stateName" class="col-sm-6 col-form-label">Whether project completed (including all hard and soft
            items of expenditure)</label>
          <div class="col-sm-6">
            <input type="radio" id="yes" name="fav_language" value="yes"> &nbsp;
            <label for="html">Yes</label>&nbsp;&nbsp;
            <input type="radio" id="no" name="fav_language" value="no">&nbsp;
            <label for="css">No</label><br>
          </div>
        </div>
  
        <div class="form-group row">
          <label for="stateName" class="col-sm-6 col-form-label">If yes , Upload completion certificate</label>
          <div class="col-sm-6">
            <input type="file" class="form-control form-control-sm" 
              />
          </div>
        </div>
        <div class="form-group row">
          <label for="stateName" class="col-sm-6 col-form-label">If not completed, then what is the percentage of
            completion of the overall project </label>
          <div class="col-sm-1">
            <input type="text" class="form-control form-control-sm">
          </div>
        </div>
      </mat-tab>
      </mat-tab-group>
      </div>
    </form>
    
    <div class="form-group text-center mt-2">
      <button class="btn btn-success btn-sm mr-2" type="submit">
        Save
      </button>
      <button class="btn btn-danger btn-sm mr-2" type="button" >Reset</button>
    </div>
  </div>
</div>
