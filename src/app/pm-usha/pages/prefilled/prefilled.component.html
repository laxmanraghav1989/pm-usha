<div class="container-fluid reg-page-bg" style="padding: 40px 20px; min-height: 100vh; background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);">
  <div class="container">
    <div class="card shadow-lg border-0 animated fadeInDown" style="border-radius: 12px; overflow: hidden;">
      <div class="card-body p-5" style="background: #ffffff;">
        <form [formGroup]="userDetail">
          <div class="row gy-4">
        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>User Id</mat-label>
            <input matInput placeholder="User Id" formControlName="userName" readonly style="cursor: not-allowed;">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Name</mat-label>
            <input matInput placeholder="Name" formControlName="name">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Designation</mat-label>
            <input matInput placeholder="Designation" formControlName="designation">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Locality/City/Village/Town</mat-label>
            <input matInput placeholder="Address Line 1" formControlName="addressLine1">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Sub-Locality/Colony/Street</mat-label>
            <input matInput placeholder="Address Line 2" formControlName="addressLine2">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>City</mat-label>
            <input matInput placeholder="City" formControlName="city">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>State</mat-label>
            <input matInput placeholder="State" formControlName="stateName">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>District</mat-label>
            <input matInput placeholder="District" formControlName="districtName">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Email</mat-label>
            <input matInput placeholder="Email" formControlName="emailId">
          </mat-form-field>
        </div>

        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Mobile</mat-label>
            <input matInput placeholder="Mobile" formControlName="mobile">
          </mat-form-field>
        </div>
        </div>
      </form>
    </div>
  </div>
</div>
