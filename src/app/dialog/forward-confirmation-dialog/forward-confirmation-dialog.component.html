<mat-dialog-content>
    <div class="row col-md-12 overflow-hidden">
        <div class="col-md-6">
            <mat-form-field class="d-block" appearance="outline">
                <mat-label>Email OTP</mat-label>
                <input type="number" matInput (paste)="false" (draggable)="false" [(ngModel)]="emailOtpV"
                (drop)="false" (dragover)="false" autocomplete="off">
            </mat-form-field>
        </div>
        <div class="col-md-1 mt-3" *ngIf="successVerifyOTP">
            <i class="fa-solid fa-circle-check text-lg" style="margin-top: 5px;
    color: green;
    float: left;"></i>
        </div>
        <div class="col-md-1 mt-3">
            <span class="timer" *ngIf="displayE !== '00:00'">{{displayE}}</span>
            <span class="resend" *ngIf="displayE === '00:00'"
                (click)="sendEmailOTP()">Resend</span>
        </div>

      
        
    </div>
    
    <div class="row col-md-12 overflow-hidden">
        <div class="col-md-6">
            <mat-form-field class="d-block" appearance="outline">
                <mat-label>Mobile OTP</mat-label>
                <input type="number" matInput (paste)="false" (draggable)="false" [(ngModel)]="mobileOtpV"
                (drop)="false" (dragover)="false" autocomplete="off">
            </mat-form-field>
        </div>
        
        <div class="col-md-1 mt-3">
            <span class="timer" *ngIf="display !== '00:00'">{{display}}</span>
            <span class="resend" *ngIf="display === '00:00'" (click)="sendMobileOTP()">Resend</span>
          </div>
          <div class="col-md-1 mt-3" *ngIf="successVerifyMobileOTP">
            <i class="fa-solid fa-circle-check text-lg" style="margin-top: 5px;
          color: green;
          float: left;"></i>
          </div>


        
    </div>
</mat-dialog-content>
<mat-dialog-actions align="center">
    <button mat-raised-button color="primary" (click)="save()">Save</button>
    <button mat-raised-button color="warn" mat-dialog-close tabindex="-1">Close</button>
</mat-dialog-actions>
