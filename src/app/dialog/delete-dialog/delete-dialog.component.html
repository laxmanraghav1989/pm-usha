
<mat-dialog-content>
	<p style="color: red;" *ngIf="viewId !== 'delete'">
		Are you sure you want to delete this record?
	</p>
	<p style="color: red;" *ngIf="viewId === 'delete'">
		Are you sure you want to <span style="color: #000000;"><b>Restore</b></span> this record?
	</p>
</mat-dialog-content>
<mat-dialog-actions align="center">
	<button mat-raised-button color="warn" (click)="onConfirmClick()"  tabindex="1">{{confirmButtonText}}</button>
	<button mat-raised-button mat-dialog-close tabindex="-1">{{cancelButtonText}}</button>
</mat-dialog-actions>
