<mat-dialog-content>
    <p *ngIf="remarkValue"> <b>Institute Name</b> : {{data?.institutationName}}</p>
    <p> <b>State Name</b> : {{data.stateName}}</p>
    <p *ngIf="remarkValue"> <b>Aishe Code</b> : {{data?.aisheCode}}</p>
    <div class="col-md-12 mb-3 mt-3" *ngIf="remarkValue === 'EditRemarks'">
        <mat-radio-group aria-label="Select an option" [(ngModel)]="constant" required >
          <mat-radio-button [value]="common.proposalRevisionApprovedByState">Approved</mat-radio-button>&nbsp;
          <mat-radio-button [value]="common.revisionProposalUnlockByAdmin" class="ml-3">Unlock</mat-radio-button>
        </mat-radio-group>
      </div>
    <div class="col-md-12">
        <mat-form-field appearance="outline" class="d-block">
            <mat-label>Remarks</mat-label>
            <textarea matInput cols="5" rows="5" [disabled]="remarkValue === 'ViewRemarks'" [(ngModel)]="remarks"></textarea>
        </mat-form-field>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="center">
	<button mat-raised-button color="primary" (click)="unlock()" [disabled]="remarkValue === 'ViewRemarks'" tabindex="1">{{data.userTypeId === sharedService.userTypeList['0'].id?'Unlock':'Save'}}</button>
	<button mat-raised-button mat-dialog-close tabindex="-1" color="warn">{{cancelButtonText}}</button>
</mat-dialog-actions>
