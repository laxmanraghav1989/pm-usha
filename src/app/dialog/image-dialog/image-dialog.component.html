<div class="dialog-container">
    <button class="close-btn" (click)="closeDialog()">✖</button>
  
    <div class="carousel-container">
      <button (click)="prevImage()" class="carousel-control-prev">&#10094;</button>
      
      <img [src]="images[activeIndex]" class="d-block w-100" alt="Gallery Image">
      
      <button (click)="nextImage()" class="carousel-control-next">&#10095;</button>
    </div>
  </div>
