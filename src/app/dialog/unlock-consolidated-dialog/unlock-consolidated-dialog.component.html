<mat-dialog-content>
    <label class="label">Unlock Shortlisted Profile</label>
    <div class="col-md-12">
        <mat-form-field appearance="outline" class="d-block">
            <mat-label>Remarks</mat-label>
            <textarea matInput cols="5" rows="5" [(ngModel)]="remarks"></textarea>
        </mat-form-field>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="center">
	<button mat-raised-button color="primary" (click)="unlock()" tabindex="1">Unlock</button>
	<button mat-raised-button mat-dialog-close tabindex="-1" color="warn">{{cancelButtonText}}</button>
</mat-dialog-actions>
