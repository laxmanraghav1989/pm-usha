<mat-dialog-content>
    <div class="row overflow-hidden col-md-12">
        <label class="col-md-3 label">Consultant:<span class="asterisk">*</span></label>
        <div class="col-md-6">
            <mat-form-field class="d-block" appearance="outline">
                <mat-select [(ngModel)]="consultantUserId" [ngModelOptions]="{standalone:true}">
                    <mat-option *ngFor="let o of data.userList" [value]="o.userName">{{o.firstName}} ({{o.userAcronym}})</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
    </div>
   
</mat-dialog-content>
<mat-dialog-actions align="center">
	<button mat-raised-button color="primary" (click)="save()" tabindex="1">Save</button>
	<button mat-raised-button mat-dialog-close tabindex="-1" color="warn">{{cancelButtonText}}</button>
</mat-dialog-actions>
