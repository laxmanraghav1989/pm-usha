<mat-dialog-content>
    <form [formGroup]="overallForm">
        <!-- <p class="text-danger ml-3">Note* :-After submission you will not be able to make any modification. Please check before submission.</p> -->
        <div class="row overflow-hidden col-md-12 mb-2">
            <label class="col-md-3 label">Whether the proposal eligible as per guidelines:<span
                    class="asterisk">*</span></label>
            <mat-radio-group aria-label="Select an option" formControlName="isProposalEligibleAsGuideline"
                class="mt-3 ml-3" (change)="getUpdatedValue($event.value)">
                <mat-radio-button [value]=true>Yes</mat-radio-button>&nbsp;
                <mat-radio-button class="ml-5" [value]=false>No</mat-radio-button>
            </mat-radio-group>
            <div class="err-msgs"
                *ngIf="overallForm.controls['isProposalEligibleAsGuideline'].dirty || overallForm.controls['isProposalEligibleAsGuideline'].value || overallForm.controls['isProposalEligibleAsGuideline'].touched || isFormInvalid ">
                <span *ngIf="overallForm.controls['isProposalEligibleAsGuideline'].hasError('required')">Please select
                </span>
            </div>
        </div>
        <div class="row overflow-hidden col-md-12 mb-2"
            *ngIf="overallForm.controls['isProposalEligibleAsGuideline'].value == false">
            <label class="col-md-3 label">If No, then reasons dropdown should come:</label>
            <div class="col-md-9">
                <mat-form-field style="width: 364px;">
                    <mat-select formControlName="proposalNotEligibleRemarkId"
                        [required]="overallForm.controls['isProposalEligibleAsGuideline'].value == false">
                        <mat-option *ngFor="let item of eligibleList" [value]="item.id">{{item.remark}}</mat-option>
                    </mat-select>
                </mat-form-field>
                <div class="err-msgs"
                    *ngIf="overallForm.controls['proposalNotEligibleRemarkId'].dirty || overallForm.controls['proposalNotEligibleRemarkId'].value || overallForm.controls['proposalNotEligibleRemarkId'].touched || isFormInvalid ">
                    <span *ngIf="overallForm.controls['proposalNotEligibleRemarkId'].hasError('required')">Please select
                    </span>
                </div>
            </div>
        </div>
        <div class="row overflow-hidden col-md-12 mb-2">
            <label class="col-md-3 label">Please Choose:<span class="asterisk">*</span></label>
            <mat-radio-group aria-label="Select an option" formControlName="scoreCorrect" class="mt-3 ml-3">
                <mat-radio-button [value]=true>All of the score are found correct.</mat-radio-button>&nbsp;
                <mat-radio-button class="ml-5" [value]=false>There is a discrepancy in score.</mat-radio-button>
            </mat-radio-group>
            <div class="err-msgs"
                *ngIf="overallForm.controls['scoreCorrect'].dirty || overallForm.controls['scoreCorrect'].value || overallForm.controls['scoreCorrect'].touched || isFormInvalid ">
                <span *ngIf="overallForm.controls['scoreCorrect'].hasError('required')">Please select
                </span>
            </div>
        </div>
        <div class="row overflow-hidden col-md-12">
            <label class="col-md-3 label">Verified score of the Proposal:<span class="asterisk">*</span></label>
            <div class="col-md-9">
                <mat-form-field appearance="outline" class="d-block block-height mt-3" >
                    <input matInput type="number" formControlName="consultantScore" oninput="javascript: if (this.value.length > this.maxLength) this.value = this.value.slice(0, this.maxLength); this.value = 
                !!this.value && Math.abs(this.value) >= 0 ? Math.abs(this.value) : null" min="0" maxlength="4">
                </mat-form-field>
                <div class="err-msgs"
                    *ngIf="overallForm.controls['consultantScore'].dirty || overallForm.controls['consultantScore'].value || overallForm.controls['consultantScore'].touched || isFormInvalid ">
                    <span *ngIf="overallForm.controls['consultantScore'].hasError('required')">Please Enter
                    </span>
                </div>
            </div>
        </div>
        <div class="row overflow-hidden col-md-12">
            <label class="col-md-3 label">Strength of the proposal:<span class="asterisk">*</span></label>
            <div class="col-md-9">
                <mat-form-field appearance="outline" class="d-block block-height mt-3">
                    <input matInput type="text" formControlName="proposalStrength">
                </mat-form-field>
                <div class="err-msgs"
                    *ngIf="overallForm.controls['proposalStrength'].dirty || overallForm.controls['proposalStrength'].value || overallForm.controls['proposalStrength'].touched || isFormInvalid ">
                    <span *ngIf="overallForm.controls['proposalStrength'].hasError('required')">Please Enter
                    </span>
                </div>
            </div>
        </div>
        <div class="row overflow-hidden col-md-12">
            <label class="col-md-3 label">Weaknesses of the proposal:<span class="asterisk">*</span></label>
            <div class="col-md-9">
                <mat-form-field appearance="outline" class="d-block block-height mt-3">
                    <input matInput type="text" formControlName="proposalWeakness">
                </mat-form-field>
                <div class="err-msgs"
                    *ngIf="overallForm.controls['proposalWeakness'].dirty || overallForm.controls['proposalWeakness'].value || overallForm.controls['proposalWeakness'].touched || isFormInvalid ">
                    <span *ngIf="overallForm.controls['proposalWeakness'].hasError('required')">Please Enter
                    </span>
                </div>
            </div>
        </div>
        <div class="row overflow-hidden col-md-12">
        <label class="col-md-3 label">Overall Comments on the Proposal:<span class="asterisk">*</span></label>
        <div class="col-md-9">
            <mat-form-field appearance="outline" class="d-block">
                <textarea matInput cols="7" rows="7" formControlName="consultantRemarks" (keypress)="onKeypressEvent($event,2000)"
                    id="remarks1"></textarea>
                <mat-hint>{{this.remarks.length}} / 2000</mat-hint>
            </mat-form-field>

        </div>
    </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="center">
    <button mat-raised-button color="primary" *ngIf="!(pabActionId === 1 || pabActionId === 2 || pabActionId === 3) && !consulatantStatus" (click)="onConfirmClick()" tabindex="1">Submit</button>
    <button mat-raised-button mat-dialog-close tabindex="-1" color="warn">Close</button>
</mat-dialog-actions>
